<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roman Numeral Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Roman Numeral Converter</h1>

    <label for="mode">Conversion Mode</label>
    <select id="mode">
        <option value="romanToInt">Roman → Integer</option>
        <option value="intToRoman">Integer → Roman</option>
    </select>

    <input id="input" type="text" placeholder="Enter value">

    <div id="result"></div>
    <div class="toggle" id="themeToggle">🌙 Toggle Dark Mode</div>
    <div id="error"></div>
</div>

<script src="script.js"></script>
</body>
</html>
